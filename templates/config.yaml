log:
  level: error
  file: "" # 输出至标准输出，方便 Docker 查看日志

api:
  http: "0.0.0.0:8080"

plugins:
  # ===========================
  # 1. 基础插件 (转发/缓存)
  # ===========================
  - tag: cache
    type: cache
    args:
      size: 20480
      lazy_cache_ttl: 604800 # 延长缓存时间，减少上游压力
      dump_file: "/etc/mosdns/cache.dump"
      dump_interval: 600

  - tag: forward_local
    type: forward
    args:
      upstreams:
        - addr: "udp://223.5.5.5" # 阿里云 DNS，解析国内域名最快
          enable_pipeline: true

  - tag: forward_remote
    type: forward
    args:
      upstreams:
        - addr: "${REMOTE_DNS}" # 环境变量已设置为 udp://10.10.1.3:53 (Surge)

  # ===========================
  # 2. 规则/匹配器
  # ===========================
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/geosite_cn.txt"   # 标准国内域名库
        - "/etc/mosdns/rules/local_direct.txt" # 你的自定义直连规则

  - tag: geosite_no_cn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rules/local_proxy.txt"  # 你手动指定的代理规则

  - tag: user_iot_ip
    type: ip_set
    args:
      files:
        - "/etc/mosdns/rules/user_iot.txt"     # 智能家居设备 IP 列表

  - tag: hosts
    type: hosts
    args:
      files:
        - "/etc/mosdns/rules/hosts.txt"        # 你的 302.abc.com 等内网劫持

  # ===========================
  # 3. 辅助处理序列
  # ===========================
  - tag: has_resp_sequence
    type: sequence
    args:
      - matches: has_resp
        exec: accept

  # 国内流 (带缓存)
  - tag: cached_local_sequence
    type: sequence
    args:
      - exec: $cache
      - matches: has_resp
        exec: accept
      - exec: $forward_local

  # 国外/兜底流 (交给 Surge 处理)
  - tag: forward_remote_upstream
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_remote

  # 匹配国内序列
  - tag: query_is_local_domain
    type: sequence
    args:
      - matches: qname $geosite_cn
        exec: $cached_local_sequence

  # 匹配手动代理序列
  - tag: query_is_no_local_domain
    type: sequence
    args:
      - matches: qname $geosite_no_cn
        exec: $forward_remote_upstream

  # ===========================
  # 4. 主入口 (核心逻辑)
  # ===========================
  - tag: main_sequence
    type: sequence
    args:
      # [1] 优先匹配 hosts.txt 里的 302/qb 等域名，实现内网直连
      - exec: $hosts
      - exec: jump has_resp_sequence
      
      # [2] 智能家居设备发起的请求，直接走国内 DNS 解析
      - matches: client_ip $user_iot_ip
        exec: $forward_local
      - matches: client_ip $user_iot_ip
        exec: accept

      # [3] 匹配国内域名列表 (geosite_cn + local_direct)
      - exec: $query_is_local_domain
      - exec: jump has_resp_sequence

      # [4] 匹配手动指定的代理域名 (local_proxy.txt)
      - exec: $query_is_no_local_domain
      - exec: jump has_resp_sequence
      
      # [5] 终极兜底：剩下的未知域名、国外域名，全部丢给 Surge
      # Surge 会根据其规则决定返回 Fake-IP 还是真 IP
      - exec: $forward_remote_upstream

  # ===========================
  # 5. 服务监听
  # ===========================
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"